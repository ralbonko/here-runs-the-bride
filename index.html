    // Goal marker — altar with groom at right end
    const gx = barX + barW + 10;
    const gy = barY + barH / 2;
    // Altar (small arch)
    ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(gx, gy + 1, 5, Math.PI, 0); ctx.stroke();
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(gx - 5, gy + 1, 1.5, 6);
    ctx.fillRect(gx + 3.5, gy + 1, 1.5, 6);
    // Groom (tiny figure under arch)
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(gx - 2, gy, 4, 5); // suit
    ctx.fillStyle = '#ffd5c2';
    ctx.beginPath(); ctx.arc(gx, gy - 1, 2, 0, Math.PI * 2); ctx.fill(); // head

    // Live timer under progress bar
    if (gameState === State.PLAYING) {
      const elapsed = (playFrames / 60).toFixed(1);
      ctx.font = '10px monospace';
      ctx.fillStyle = '#f5e0c8';
      ctx.textAlign = 'center';
      ctx.fillText(elapsed + 's', barX + barW / 2, barY + barH + 16);
    }
  }

  function drawHUD() {
    // --- Top-left: HP hearts ---
    for (let i = 0; i < 3; i++) {
      drawHudHeart(12 + i * 15, 10, i < hp);
    }

    // --- Top-center: Progress bar ---
    drawProgressBar();

    // --- Top-right: Score ---
    const scoreStr = 'SCORE: ' + String(score).padStart(4, '0');
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    ctx.fillText(scoreStr, CANVAS_W - 12, 10);

    // --- Powerup indicators (stacked below score) ---
    let indicatorY = 28;
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    if (boostTimer > 0 && Math.floor(frameTick / 8) % 2 === 0) {
      ctx.fillStyle = '#ffd700';
      ctx.fillText('\u26A1 BOOST!', CANVAS_W - 12, indicatorY);
      indicatorY += 14;
    }
    if (boostTimer > 0 && Math.floor(frameTick / 8) % 2 !== 0) {
      indicatorY += 14; // reserve space even when flashing off
    }
    if (invincibleTimer > 0) {
      const hue = (frameTick * 10) % 360;
      ctx.fillStyle = `hsl(${hue}, 100%, 55%)`;
      ctx.fillText('\u2B50 INVINCIBLE!', CANVAS_W - 12, indicatorY);
      indicatorY += 14;
    }
    if (multiplierTimer > 0) {
      ctx.fillStyle = (Math.floor(frameTick / 10) % 2 === 0) ? '#ffd700' : '#e0b0ff';
      ctx.fillText('2X SCORE!', CANVAS_W - 12, indicatorY);
      indicatorY += 14;
    }
    if (magnetTimer > 0) {
      ctx.fillStyle = '#00e5ff';
      ctx.fillText('MAGNET!', CANVAS_W - 12, indicatorY);
      indicatorY += 14;
    }
  }

  // ============================================================
  // MUTE BUTTON
  // ============================================================
  const MUTE_X = CANVAS_W - 32;
  const MUTE_Y = CANVAS_H - 28;
  const MUTE_SIZE = 20;

  function drawMuteButton() {
    const x = MUTE_X, y = MUTE_Y, s = MUTE_SIZE;
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#ffffff';
    // Speaker body
    ctx.fillRect(x, y + 6, 6, 8);
    ctx.beginPath();
    ctx.moveTo(x + 6, y + 4);
    ctx.lineTo(x + 12, y);
    ctx.lineTo(x + 12, y + s);
    ctx.lineTo(x + 6, y + 16);
    ctx.closePath();
    ctx.fill();
    if (muted) {
      // X mark
      ctx.strokeStyle = '#ff4444';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x + 14, y + 4); ctx.lineTo(x + s, y + 16);
      ctx.moveTo(x + s, y + 4); ctx.lineTo(x + 14, y + 16);
      ctx.stroke();
    } else {
      // Sound waves
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(x + 13, y + 10, 4, -0.6, 0.6); ctx.stroke();
      ctx.beginPath(); ctx.arc(x + 13, y + 10, 7, -0.6, 0.6); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  function isMuteClick(canvasX, canvasY) {
    return canvasX >= MUTE_X - 4 && canvasX <= MUTE_X + MUTE_SIZE + 4 &&
           canvasY >= MUTE_Y - 4 && canvasY <= MUTE_Y + MUTE_SIZE + 4;
  }

  function getCanvasCoords(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (clientX - rect.left) / rect.width * CANVAS_W,
      y: (clientY - rect.top) / rect.height * CANVAS_H,
    };
  }

  // ============================================================
  // RENDER HELPERS
  // ============================================================
  function drawTiledLayer(lc, tW, par) {
    const off = (scrollX * par) % tW;
    for (let x = -off; x < CANVAS_W; x += tW) ctx.drawImage(lc, x, 0);
  }

  function drawPetals() {
    for (const p of petals) {
      // Animate drift
      const px = (p.x + frameTick * p.drift + Math.sin(frameTick * 0.02 + p.phase) * 15) % (CANVAS_W + 20) - 10;
      const py = (p.y + frameTick * p.fall) % (CANVAS_H * 0.8);
      const wobble = Math.sin(frameTick * 0.04 + p.phase) * 0.5;
      ctx.save();
      ctx.globalAlpha = 0.5;
      ctx.translate(px, py);
      ctx.rotate(wobble);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size, p.size * 0.6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  // ============================================================
  // RENDER
  // ============================================================
  function render() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    if (gameState === State.TITLE) {
      // Full scenery backdrop (static)
      ctx.drawImage(skyCanvas, 0, 0);
      drawPetals();
      drawTiledLayer(farHillCanvas, FAR_TILE_W, 0.15);
      drawTiledLayer(midCanvas, MID_TILE_W, 0.4);
      drawTiledLayer(groundCanvas, GND_TILE_W, 1.0);

      // Ambient confetti
      for (const c of titleConfetti) {
        ctx.globalAlpha = 0.5;
        ctx.fillStyle = c.color;
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(c.spin * frameTick);
        ctx.fillRect(-c.size / 2, -c.size / 2, c.size, c.size);
        ctx.restore();
      }
      ctx.globalAlpha = 1;

      // Dog (sitting beside Amanda on title screen)
      const amandaTitleX = CANVAS_W / 2 - 40;
      drawDog(amandaTitleX - 30, GROUND_Y, 0, true);

      // Amanda (left of center) facing right
      drawBride(amandaTitleX, GROUND_Y, 0, false, null);

      // Anthony (right of center) facing left
      const anthonyTitleX = CANVAS_W / 2 + 40;
      drawGroom(anthonyTitleX, GROUND_Y);

      // Bobbing heart between them
      const heartBob = Math.sin(frameTick * 0.06) * 4;
      const heartCX = CANVAS_W / 2;
      const heartCY = GROUND_Y - 24 + heartBob;
      drawBigHeart(heartCX, heartCY, 0.6);

      // Slight dark overlay for text readability
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(0, 0, CANVAS_W, 130);

      // Title: "HERE RUNS THE BRIDE" with drop shadow
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 44px monospace';
      // Shadow
      ctx.fillStyle = '#5a3520';
      ctx.fillText('HERE RUNS THE BRIDE', CANVAS_W / 2 + 2, 52);
      // Gold text
      ctx.fillStyle = '#ffd700';
      ctx.fillText('HERE RUNS THE BRIDE', CANVAS_W / 2, 50);

      // Subtitle
      ctx.font = '18px monospace';
      ctx.fillStyle = '#ffffff';
      ctx.fillText('Amanda & Anthony \u2014 11.14.26', CANVAS_W / 2, 90);

      // Top 10 Leaderboard (right side)
      {
        const entries = loadTopScores();
        if (entries.length > 0) {
          const lx = 670, ly = 140;
          ctx.fillStyle = 'rgba(0,0,0,0.35)';
          ctx.fillRect(lx - 80, ly - 18, 160, Math.min(entries.length, 10) * 18 + 30);
          ctx.textAlign = 'center';
          ctx.font = 'bold 12px monospace';
          ctx.fillStyle = '#ffd700';
          ctx.fillText('TOP SCORES', lx, ly);
          ctx.font = '11px monospace';
          for (let i = 0; i < Math.min(entries.length, 10); i++) {
            const row = ly + 18 + i * 18;
            ctx.fillStyle = i === 0 ? '#ffd700' : (i < 3 ? '#f5e0c8' : '#ccbbaa');
            ctx.textAlign = 'right';
            ctx.fillText((i + 1) + '.', lx - 42, row);
            ctx.textAlign = 'left';
            const name = (entries[i].name || '???').substring(0, 8).padEnd(8, ' ');
            ctx.fillText(name + ' ' + String(entries[i].score).padStart(5, ' '), lx - 35, row);
          }
        }
      }

      // Blinking start prompt
      if (Math.floor(frameTick / 40) % 2 === 0) {
        ctx.font = '16px monospace';
        ctx.fillStyle = '#ffffff';
        ctx.textAlign = 'center';
        const promptText = hasInteracted
          ? (isTouchDevice ? 'Tap to Start' : 'Press SPACE or Tap to Start')
          : '\u266b Tap anywhere to begin \u266b';
        ctx.fillText(promptText, CANVAS_W / 2, CANVAS_H - 38);
      }

      // Bottom line: name, help, mute — spaced across width
      ctx.font = '13px monospace';
      ctx.fillStyle = '#ffffff';
      const bottomY = CANVAS_H - 14;
      if (playerName) {
        ctx.textAlign = 'left';
        ctx.fillText(playerName + (isTouchDevice ? '  \u270e Change Name' : '  [N] Change Name'), 16, bottomY);
      }
      ctx.textAlign = 'center';
      ctx.fillText(isTouchDevice ? 'How to Play' : '[H] How to Play', CANVAS_W / 2, bottomY);
      ctx.textAlign = 'right';
      ctx.fillText(isTouchDevice ? (muted ? 'Unmute' : 'Mute') : '[M] ' + (muted ? 'Unmute' : 'Mute'), CANVAS_W - 50, bottomY);

    } else if (gameState === State.HELP) {
      // How to Play screen
      ctx.drawImage(skyCanvas, 0, 0);
      drawPetals();
      drawTiledLayer(farHillCanvas, FAR_TILE_W, 0.15);
      drawTiledLayer(midCanvas, MID_TILE_W, 0.4);
      drawTiledLayer(groundCanvas, GND_TILE_W, 1.0);

      // Dark overlay for readability
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      // Header
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 28px monospace';
      ctx.fillStyle = '#ffd700';
      ctx.fillText('HOW TO PLAY', CANVAS_W / 2, 30);

      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      const leftX = 50;
      const rightX = 420;
      let y;

      // === LEFT COLUMN ===

      // Controls
      y = 58;
      ctx.font = 'bold 14px monospace';
      ctx.fillStyle = '#ffd700';
      ctx.fillText('CONTROLS', leftX, y);
      y += 20;
      ctx.font = '12px monospace';
      ctx.fillStyle = '#f5e0c8';
      ctx.fillText('SPACE / TAP \u2014 Jump', leftX + 8, y); y += 16;
      ctx.fillText('SPACE x2 \u2014 Double Jump', leftX + 8, y); y += 16;
      ctx.fillText('Jump over obstacles to', leftX + 8, y); y += 14;
      ctx.fillText('reach the altar!', leftX + 8, y); y += 22;

      // Health
      ctx.font = 'bold 14px monospace';
      ctx.fillStyle = '#ffd700';
      ctx.fillText('HEALTH', leftX, y); y += 20;
      ctx.font = '12px monospace';
      ctx.fillStyle = '#f5e0c8';
      // Draw 3 mini hearts
      for (let i = 0; i < 3; i++) {
        drawHudHeart(leftX + 12 + i * 15, y, true);
      }
      ctx.fillText('3 hits and it\'s game over', leftX + 58, y + 2); y += 22;

      // Obstacles
      ctx.font = 'bold 14px monospace';
      ctx.fillStyle = '#ffd700';
      ctx.fillText('OBSTACLES', leftX, y); y += 20;
      ctx.font = '11px monospace';
      ctx.fillStyle = '#f5e0c8';
      const obstacles_info = [
        ['Mother-in-Law', 'Shakes fist angrily'],
        ['Drunk Uncle', 'Paces back and forth'],
        ['Photographer', 'Blocks the aisle'],
        ['Crying Baby', 'Sits in your path'],
        ['Flower Girl', 'Throws flaming flowers!'],
        ['Rain Cloud', 'Floats with lightning'],
      ];
      for (const [name, desc] of obstacles_info) {
        ctx.fillStyle = '#ffffff';
        ctx.fillText(name, leftX + 8, y);
        ctx.fillStyle = '#b0a090';
        ctx.fillText(' \u2014 ' + desc, leftX + 8 + ctx.measureText(name).width, y);
        y += 15;
      }

      // === RIGHT COLUMN ===

      // Items
      y = 58;
      ctx.font = 'bold 14px monospace';
      ctx.fillStyle = '#ffd700';
      ctx.fillText('ITEMS & POWERUPS', rightX, y); y += 22;

      // Item rows with mini sprites
      const itemRows = [
        [0, 'Heart', 'Restores 1 HP'],
        [1, 'Ring', '+25 pts'],
        [2, 'Champagne', '+10 pts, Speed boost (2s)'],
        [3, 'Bouquet', '+10 pts, Invincibility (5s)'],
        [4, 'Tiara', '+10 pts, 2x Score (8s)'],
        [5, 'Magnet', '+10 pts, Pulls items (5s)'],
      ];
      ctx.save();
      for (const [type, name, desc] of itemRows) {
        // Draw mini collectible sprite
        const spriteX = rightX + 12;
        const spriteY = y + 8;
        ctx.save();
        ctx.translate(spriteX, spriteY);
        ctx.scale(0.8, 0.8);
        switch (type) {
          case 0: drawCollectHeart(0, 0); break;
          case 1: drawCollectRing(0, 0); break;
          case 2: drawCollectChampagne(0, 0); break;
          case 3: drawCollectBouquet(0, 0); break;
          case 4: drawCollectTiara(0, 0); break;
          case 5: drawCollectMagnet(0, 0); break;
        }
        ctx.restore();
        // Label and description
        ctx.font = '11px monospace';
        ctx.fillStyle = '#ffffff';
        ctx.fillText(name, rightX + 30, y + 2);
        ctx.fillStyle = '#b0a090';
        ctx.fillText(desc, rightX + 30, y + 14);
        y += 28;
      }
      ctx.restore();

      // Scoring
      y += 6;
      ctx.font = 'bold 14px monospace';
      ctx.fillStyle = '#ffd700';
      ctx.fillText('SPEED BONUS', rightX, y); y += 20;
      ctx.font = '11px monospace';
      ctx.fillStyle = '#f5e0c8';
      ctx.fillText('Grab champagne for a speed', rightX + 8, y); y += 14;
      ctx.fillText('bonus multiplier!', rightX + 8, y); y += 16;
      ctx.fillStyle = '#ffffff';
      ctx.fillText('1 = 1.5x  2 = 2x  3 = 2.5x', rightX + 8, y); y += 14;
      ctx.fillText('4 = 3x  5 = 3.5x  6+ = 4x', rightX + 8, y);

      // Footer
      if (Math.floor(frameTick / 40) % 2 === 0) {
        ctx.textAlign = 'center';
        ctx.font = '14px monospace';
        ctx.fillStyle = '#f5e0c8';
        ctx.fillText(isTouchDevice ? 'Tap to go back' : 'Press SPACE, H, or Tap to go back', CANVAS_W / 2, CANVAS_H - 20);
      }

    } else if (gameState === State.NAME_ENTRY) {
      // Name input screen (first launch only)
      ctx.drawImage(skyCanvas, 0, 0);
      drawPetals();
      drawTiledLayer(farHillCanvas, FAR_TILE_W, 0.15);
      drawTiledLayer(midCanvas, MID_TILE_W, 0.4);
      drawTiledLayer(groundCanvas, GND_TILE_W, 1.0);

      // Dark overlay for readability
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(0, CANVAS_H / 2 - 90, CANVAS_W, 180);

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Prompt
      ctx.font = 'bold 28px monospace';
      ctx.fillStyle = '#ffd700';
      ctx.fillText('ENTER YOUR NAME', CANVAS_W / 2, CANVAS_H / 2 - 50);

      // Input box
      const boxW = 220, boxH = 36;
      const boxX = CANVAS_W / 2 - boxW / 2;
      const boxY = CANVAS_H / 2 - boxH / 2;
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(boxX, boxY, boxW, boxH);
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 2;
      ctx.strokeRect(boxX, boxY, boxW, boxH);

      // Name text with blinking cursor
      ctx.font = 'bold 22px monospace';
      ctx.fillStyle = '#ffffff';
      const cursor = Math.floor(frameTick / 30) % 2 === 0 ? '|' : '';
      ctx.fillText(nameEntryBuffer + cursor, CANVAS_W / 2, CANVAS_H / 2);

      // Confirm button
      const btnW = 140, btnH = 32;
      const btnX = CANVAS_W / 2 - btnW / 2, btnY = CANVAS_H / 2 + 30;
      ctx.fillStyle = 'rgba(255,215,0,0.25)';
      ctx.fillRect(btnX, btnY, btnW, btnH);
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 2;
      ctx.strokeRect(btnX, btnY, btnW, btnH);
      ctx.font = 'bold 16px monospace';
      ctx.fillStyle = '#ffd700';
      ctx.fillText('CONFIRM', CANVAS_W / 2, btnY + btnH / 2);

      // Instructions
      ctx.font = '14px monospace';
      ctx.fillStyle = '#f5e0c8';
      ctx.fillText(isTouchDevice ? 'Tap CONFIRM when ready' : 'Press ENTER to confirm', CANVAS_W / 2, CANVAS_H / 2 + 80);

    } else if (gameState === State.READY) {
      // "GET READY!" → "LET'S GO!" countdown screen
      ctx.drawImage(skyCanvas, 0, 0);
      drawPetals();
      drawTiledLayer(farHillCanvas, FAR_TILE_W, 0.15);
      drawTiledLayer(midCanvas, MID_TILE_W, 0.4);
      drawTiledLayer(groundCanvas, GND_TILE_W, 1.0);

      // Draw Amanda standing ready
      drawBride(120, GROUND_Y, 0, false, null);

      // Slight overlay for text pop
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.fillRect(0, CANVAS_H / 2 - 60, CANVAS_W, 120);

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      if (readyTimer < 120) {
        // "GET READY!" phase — text scales in with bounce
        const progress = Math.min(readyTimer / 60, 1);
        const scale = progress < 0.3 ? progress / 0.3 * 1.3 : (progress < 0.5 ? 1.3 - (progress - 0.3) / 0.2 * 0.3 : 1.0);
        ctx.save();
        ctx.translate(CANVAS_W / 2, CANVAS_H / 2);
        ctx.scale(scale, scale);
        ctx.font = 'bold 52px monospace';
        ctx.fillStyle = '#5a3520';
        ctx.fillText('GET READY!', 2, 2);
        ctx.fillStyle = '#ffd700';
        ctx.fillText('GET READY!', 0, 0);
        ctx.restore();
        // Subtitle
        if (readyTimer > 20) {
          ctx.font = '18px monospace';
          ctx.fillStyle = '#ffffff';
          ctx.globalAlpha = Math.min((readyTimer - 20) / 15, 1);
          ctx.fillText('Help Amanda reach the altar!', CANVAS_W / 2, CANVAS_H / 2 + 40);
          ctx.globalAlpha = 1;
        }
      } else {
        // "LET'S GO!!" phase — big, flashing rainbow text
        const flash = Math.floor(readyTimer / 3) % 2;
        const goScale = 1.2 + Math.sin(readyTimer * 0.3) * 0.15;
        ctx.save();
        ctx.translate(CANVAS_W / 2, CANVAS_H / 2);
        ctx.scale(goScale, goScale);
        ctx.font = 'bold 60px monospace';
        const hue = (readyTimer * 12) % 360;
        ctx.fillStyle = '#5a3520';
        ctx.fillText("LET'S GO!!", 3, 3);
        ctx.fillStyle = flash ? `hsl(${hue}, 100%, 60%)` : '#ffd700';
        ctx.fillText("LET'S GO!!", 0, 0);
        ctx.restore();
      }

    } else if (gameState === State.PLAYING) {
      // Screen shake
      if (shakeTimer > 0) {
        const sx = (Math.random() - 0.5) * 6;
        const sy = (Math.random() - 0.5) * 6;
        ctx.save();
        ctx.translate(sx, sy);
      }
      ctx.drawImage(skyCanvas, 0, 0);
      drawPetals();
      drawTiledLayer(farHillCanvas, FAR_TILE_W, 0.15);
      drawTiledLayer(midCanvas, MID_TILE_W, 0.4);
      drawTiledLayer(groundCanvas, GND_TILE_W, 1.0);

      // Obstacles
      for (const obs of obstacles) drawObstacle(obs);
      for (const ff of flamingFlowers) drawFlamingFlower(ff);

      // Collectibles
      for (const col of collectibles) drawCollectible(col);

      // Sparkles (behind Amanda)
      for (const s of sparkles) {
        const alpha = s.life / 15;
        ctx.fillStyle = s.color;
        ctx.globalAlpha = alpha;
        ctx.fillRect(s.x, s.y, s.size, s.size);
      }
      ctx.globalAlpha = 1;

      // Invincible rainbow glow (larger, takes priority)
      if (invincibleTimer > 0) {
        const hue = (frameTick * 8) % 360;
        const glowAlpha = invincibleTimer > 60 ? 0.2 : (Math.floor(frameTick/4)%2===0 ? 0.2 : 0);
        if (glowAlpha > 0) {
          ctx.fillStyle = `hsla(${hue}, 100%, 60%, ${glowAlpha})`;
          ctx.beginPath();
          ctx.ellipse(player.x, player.y - 16, 30, 28, 0, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      // Boost glow
      if (boostTimer > 0 && invincibleTimer <= 0) {
        const glowAlpha = 0.12 + Math.sin(frameTick * 0.25) * 0.06;
        ctx.fillStyle = `rgba(255, 215, 0, ${glowAlpha})`;
        ctx.beginPath();
        ctx.ellipse(player.x, player.y - 16, 24, 22, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      // Multiplier gold glow
      if (multiplierTimer > 0 && invincibleTimer <= 0) {
        const ga = 0.1 + Math.sin(frameTick * 0.15) * 0.05;
        ctx.fillStyle = `rgba(224, 176, 255, ${ga})`;
        ctx.beginPath();
        ctx.ellipse(player.x, player.y - 16, 22, 20, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      // Magnet cyan glow
      if (magnetTimer > 0 && invincibleTimer <= 0) {
        const ga = 0.1 + Math.sin(frameTick * 0.2) * 0.06;
        ctx.fillStyle = `rgba(0, 229, 255, ${ga})`;
        ctx.beginPath();
        ctx.ellipse(player.x, player.y - 16, 26, 24, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Amanda
      let tint = null;
      if (invincibleTimer > 0) {
        // Rainbow flash — blink on/off in last second as warning
        if (invincibleTimer > 60 || Math.floor(frameTick/4)%2 === 0) {
          tint = RAINBOW_COLORS[Math.floor(frameTick / 4) % RAINBOW_COLORS.length];
        }
      } else if (flashTimer > 0 && Math.floor(frameTick/3)%2===0) {
        tint = '#ff3333';
      }
      drawDog(dog.x, dog.y, dog.animFrame, false);
      drawBride(player.x, player.y, player.animFrame, !player.grounded, tint);

      // Particles (on top)
      for (const p of particles) {
        const alpha = p.life / 20;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - 1, p.y - 1, 3, 3);
      }
      ctx.globalAlpha = 1;

      // Floating texts
      for (const ft of floatingTexts) {
        const alpha = ft.life / 45;
        const rise = (45 - ft.life) * 0.8;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 14px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(ft.text, ft.x, ft.y - rise);
        ctx.globalAlpha = 1;
      }

      // Jump hint on first play
      if (jumpHintTimer > 0) {
        ctx.globalAlpha = Math.min(jumpHintTimer / 30, 1) * 0.7;
        ctx.fillStyle = '#ffffff';
        ctx.font = '16px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('TAP TO JUMP \u2022 DOUBLE TAP FOR DOUBLE JUMP', CANVAS_W / 2, CANVAS_H / 2 + 40);
        ctx.globalAlpha = 1;
      }

      // HUD
      drawHUD();

      if (shakeTimer > 0) ctx.restore();

    } else if (gameState === State.GAMEOVER) {
      ctx.drawImage(skyCanvas, 0, 0);
      drawPetals();
      drawTiledLayer(farHillCanvas, FAR_TILE_W, 0.15);
      drawTiledLayer(midCanvas, MID_TILE_W, 0.4);
      drawTiledLayer(groundCanvas, GND_TILE_W, 1.0);
      for (const obs of obstacles) drawObstacle(obs);
      for (const ff of flamingFlowers) drawFlamingFlower(ff);
      for (const col of collectibles) drawCollectible(col);

      // Dog (sitting during game over)
      drawDog(dog.x, dog.y, 0, true);

      // Amanda stumble animation
      if (gameOverPhase === 0) {
        // Tilting over 15 frames
        const t = Math.min(gameOverTimer / 15, 1);
        const tiltAngle = t * 0.55; // ~31 degrees
        const dropY = t * 6;
        ctx.save();
        ctx.translate(player.x, player.y + dropY);
        ctx.rotate(tiltAngle);
        ctx.translate(-player.x, -(player.y + dropY));
        drawBride(player.x, player.y + dropY, 0, false, '#ff3333');
        ctx.restore();
      } else {
        // Final stumble pose (tilted, dropped)
        ctx.save();
        ctx.translate(player.x, player.y + 6);
        ctx.rotate(0.55);
        ctx.translate(-player.x, -(player.y + 6));
        drawBride(player.x, player.y + 6, 0, false, null);
        ctx.restore();
      }

      // Phase 2: overlay with text
      if (gameOverPhase === 2) {
        const fadeAlpha = Math.min(gameOverTimer / 40, 1);

        // Dark overlay
        ctx.globalAlpha = fadeAlpha * 0.6;
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
        ctx.globalAlpha = 1;

        ctx.globalAlpha = fadeAlpha;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // "GAME OVER"
        ctx.fillStyle = '#e94560';
        ctx.font = 'bold 48px monospace';
        ctx.fillText('GAME OVER', CANVAS_W / 2, CANVAS_H / 2 - 50);

        // Score
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 20px monospace';
        ctx.fillText('SCORE: ' + String(score).padStart(4, '0'), CANVAS_W / 2, CANVAS_H / 2);

        // High score
        ctx.fillStyle = '#ffd700';
        ctx.font = '16px monospace';
        if (isNewHighScore) {
          const glow = 0.6 + Math.sin(frameTick * 0.12) * 0.4;
          ctx.globalAlpha = fadeAlpha * glow;
          ctx.font = 'bold 18px monospace';
          if (highScoreRank === 0) {
            ctx.fillText('NEW #1 HIGH SCORE!', CANVAS_W / 2, CANVAS_H / 2 + 30);
          } else {
            ctx.fillText('NEW TOP ' + (highScoreRank + 1) + ' SCORE!', CANVAS_W / 2, CANVAS_H / 2 + 30);
          }
          ctx.globalAlpha = fadeAlpha;
        } else {
          ctx.fillText('HIGH SCORE: ' + String(highScore).padStart(4, '0'), CANVAS_W / 2, CANVAS_H / 2 + 30);
        }

        // Pulsing "Tap to try again"
        if (gameOverTimer > 60) {
          const pulse = 0.5 + Math.sin(frameTick * 0.08) * 0.5;
          ctx.globalAlpha = fadeAlpha * pulse;
          ctx.fillStyle = '#f5e0c8';
          ctx.font = '14px monospace';
          ctx.fillText(isTouchDevice ? 'Tap to try again' : 'Tap or press SPACE to try again', CANVAS_W / 2, CANVAS_H / 2 + 75);
        }
        ctx.globalAlpha = 1;
      }

    } else if (gameState === State.WIN) {
      ctx.drawImage(skyCanvas, 0, 0);
      drawPetals();
      drawTiledLayer(farHillCanvas, FAR_TILE_W, 0.15);
      drawTiledLayer(midCanvas, MID_TILE_W, 0.4);
      drawTiledLayer(groundCanvas, GND_TILE_W, 1.0);

      // Draw altar (behind characters)
      if (winPhase >= 1) drawAltar(altarX);

      // Draw Anthony at altar (lean toward bride during kiss)
      if (winPhase >= 1) {
        if (winPhase >= 3) {
          ctx.save();
          ctx.translate(anthonyX, GROUND_Y);
          ctx.rotate(-0.15); // lean left toward bride
          drawGroom(0, 0);
          ctx.restore();
        } else {
          drawGroom(anthonyX, GROUND_Y);
        }
      }

      // Draw dog (sitting during kiss, trotting otherwise)
      drawDog(dog.x, dog.y, dog.animFrame, winPhase >= 3);

      // Draw Amanda (lean toward groom during kiss)
      if (winPhase >= 3) {
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(0.15); // lean right toward groom
        drawBride(0, 0, player.animFrame, false, null);
        ctx.restore();
      } else {
        drawBride(player.x, player.y, player.animFrame, false, null);
      }

      // Big heart above the couple (phases 3+)
      if (winPhase >= 3 && kissHeartScale > 0) {
        const meetX = (player.x + anthonyX) / 2;
        const heartY = GROUND_Y - 50 - kissHeartScale * 20;
        drawBigHeart(meetX, heartY, kissHeartScale);
      }

      // Confetti (phases 3+)
      for (const c of confetti) {
        const alpha = Math.min(c.life / 30, 1);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = c.color;
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(c.spin * frameTick);
        ctx.fillRect(-c.size / 2, -c.size / 2, c.size, c.size);
        ctx.restore();
      }
      ctx.globalAlpha = 1;

      // White screen flash
      if (screenFlash > 0) {
        ctx.globalAlpha = screenFlash;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
        ctx.globalAlpha = 1;
      }

      // Phase 5: overlay with final text
      if (winPhase === 5) {
        const fadeAlpha = Math.min(winTimer / 60, 1);

        // Dark overlay
        ctx.globalAlpha = fadeAlpha * 0.55;
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
        ctx.globalAlpha = 1;

        ctx.globalAlpha = fadeAlpha;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // "Amanda & Anthony"
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 44px monospace';
        ctx.fillText('Amanda & Anthony', CANVAS_W / 2, CANVAS_H / 2 - 50);

        // "See you November 14!"
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 22px monospace';
        ctx.fillText('See you November 14!', CANVAS_W / 2, CANVAS_H / 2 - 5);

        // Time + score breakdown
        const secs = (playFrames / 60).toFixed(1);
        ctx.fillStyle = '#f5e0c8';
        ctx.font = '14px monospace';
        ctx.fillText('Time: ' + secs + 's', CANVAS_W / 2, CANVAS_H / 2 + 22);
        ctx.fillText('Score: ' + score + ' x ' + timeBonus + ' speed bonus', CANVAS_W / 2, CANVAS_H / 2 + 40);
        ctx.fillStyle = '#ffd700';
        ctx.font = 'bold 18px monospace';
        ctx.fillText('FINAL SCORE: ' + String(finalScore).padStart(4, '0'), CANVAS_W / 2, CANVAS_H / 2 + 62);

        // High score celebration
        if (isNewHighScore) {
          const hsY = CANVAS_H / 2 + 85;
          // Pulsing glow
          const glow = 0.6 + Math.sin(frameTick * 0.12) * 0.4;
          ctx.globalAlpha = fadeAlpha * glow;
          ctx.fillStyle = '#ffd700';
          ctx.font = 'bold 18px monospace';
          if (highScoreRank === 0) {
            ctx.fillText('NEW #1 HIGH SCORE!', CANVAS_W / 2, hsY);
          } else {
            ctx.fillText('NEW TOP ' + (highScoreRank + 1) + ' SCORE!', CANVAS_W / 2, hsY);
          }
          ctx.globalAlpha = fadeAlpha;
        }

        // Pulsing "Tap to play again"
        if (winTimer > 90) {
          const pulse = 0.5 + Math.sin(frameTick * 0.08) * 0.5;
          ctx.globalAlpha = fadeAlpha * pulse;
          ctx.fillStyle = '#ffd700';
          ctx.font = '14px monospace';
          ctx.fillText(isTouchDevice ? 'Tap to play again' : 'Tap or press SPACE to play again', CANVAS_W / 2, CANVAS_H / 2 + (isNewHighScore ? 115 : 95));
        }
        ctx.globalAlpha = 1;
      }
    }

    // Mute button (always visible)
    drawMuteButton();
  }

  // ============================================================
  // GAME LOOP
  // ============================================================
  let accumulator = 0;
  let lastTime = performance.now();

  function loop(now) {
    if (pausedByOrientation) {
      lastTime = now;
      requestAnimationFrame(loop);
      return;
    }
    const elapsed = now - lastTime;
    lastTime = now;
    accumulator += elapsed;
    while (accumulator >= FIXED_DT) {
      update(FIXED_DT);
      accumulator -= FIXED_DT;
    }
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
